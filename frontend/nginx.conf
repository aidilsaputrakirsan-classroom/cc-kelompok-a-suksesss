# ==========================================
# Nginx Configuration - Production (React SPA)
# ==========================================

# 1. GZIP COMPRESSION
gzip on;
gzip_min_length 256;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 2. GLOBAL SECURITY HEADERS
    # Ditaruh di sini agar berlaku untuk semua request
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 3. LOGGING
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # 4. SPA ROUTING
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 5. STATIC ASSETS (Cache 1 Tahun)
    # File JS/CSS di React biasanya punya hash (misal: main.123.js), jadi aman di-cache lama
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # PENTING: Panggil ulang security headers karena add_header di dalam 
        # location akan menghapus add_header yang ada di level server.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # 6. INDEX.HTML (No Cache)
    # Penting agar user selalu dapat versi terbaru dari app kamu
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 7. ERROR PAGES
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # 8. BLOCK HIDDEN FILES (Security)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

} # <--- Penutup blok server sekarang sudah benar